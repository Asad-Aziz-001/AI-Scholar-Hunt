<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <title>Log In | AI Scholar Hunt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #1e40af;
            --primary-light: #3b82f6;
            --primary-dark: #1e3a8a;
            --secondary: #f59e0b;
            --text: #1e293b;
            --text-light: #64748b;
            --bg: #f8fafc;
            --white: #ffffff;
            --gray: #e2e8f0;
            --success: #10b981;
            --error: #e74c3c;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header/Navbar */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: var(--white);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        header.scrolled {
            padding: 10px 0;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background-color: var(--primary);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            font-weight: 500;
            position: relative;
            padding: 5px 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--primary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a.active {
            color: var(--primary);
            font-weight: 600;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--primary);
            cursor: pointer;
        }

        /* Login Section */
        .login-section {
            min-height: calc(100vh - 200px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 120px 20px 80px;
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 20;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary);
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--gray);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary-light);
            outline: none;
        }

        .form-group input.invalid {
            border-color: var(--error);
            animation: shake 0.3s;
        }

        .error-message {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: var(--primary-dark);
        }

        .btn:disabled {
            background: var(--gray);
            cursor: not-allowed;
        }

        .extra-links {
            text-align: center;
            margin-top: 15px;
        }

        .extra-links a {
            color: var(--primary-light);
            font-size: 0.9rem;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            50% {
                transform: translateX(5px);
            }

            75% {
                transform: translateX(-5px);
            }

            100% {
                transform: translateX(0);
            }
        }

        /* Custom Popup Modal Styles */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .popup-card {
            background: var(--white);
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
            transform: scale(0.7);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            overflow: hidden;
        }

        .popup-overlay.active .popup-card {
            transform: scale(1);
        }

        .popup-header {
            padding: 20px 20px 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid var(--gray);
        }

        .popup-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .popup-icon.success {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .popup-icon.error {
            background-color: rgba(231, 76, 60, 0.15);
            color: var(--error);
        }

        .popup-icon.warning {
            background-color: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }

        .popup-icon.info {
            background-color: rgba(59, 130, 246, 0.15);
            color: var(--info);
        }

        .popup-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
        }

        .popup-body {
            padding: 25px 20px;
        }

        .popup-message {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-light);
        }

        .popup-footer {
            padding: 15px 20px 25px;
            display: flex;
            justify-content: center;
        }

        .popup-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .popup-btn.primary {
            background: var(--primary);
            color: white;
        }

        .popup-btn.primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .popup-btn.success-btn {
            background: var(--success);
            color: white;
        }

        .popup-btn.error-btn {
            background: var(--error);
            color: white;
        }

        /* Footer */
        .footer {
            background-color: var(--primary-dark);
            color: var(--white);
            padding: 80px 0 30px;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
            margin-bottom: 60px;
        }

        .footer-about {
            grid-column: span 2;
        }

        .footer-logo {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-logo-icon {
            width: 40px;
            height: 40px;
            background-color: var(--white);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .footer-about p {
            opacity: 0.8;
            margin-bottom: 25px;
            line-height: 1.7;
        }

        .social-links {
            display: flex;
            gap: 15px;
        }

        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background-color: var(--secondary);
            transform: translateY(-3px);
        }

        .footer-links h3 {
            font-size: 1.2rem;
            margin-bottom: 25px;
            position: relative;
            padding-bottom: 10px;
        }

        .footer-links h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 3px;
            background-color: var(--secondary);
        }

        .footer-links ul {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 12px;
        }

        .footer-links a {
            opacity: 0.8;
            transition: all 0.3s ease;
            padding-left: 15px;
            position: relative;
        }

        .footer-links a::before {
            content: '→';
            position: absolute;
            left: 0;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .footer-links a:hover {
            opacity: 1;
            padding-left: 20px;
        }

        .footer-links a:hover::before {
            opacity: 1;
            left: -5px;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-bottom p {
            opacity: 0.7;
            margin-bottom: 20px;
        }

        .footer-tags {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .tag {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .tag:hover {
            background-color: var(--secondary);
            color: var(--text);
        }

        /* Responsive */
        @media (max-width: 992px) {
            .footer-content {
                grid-template-columns: repeat(2, 1fr);
            }

            .footer-about {
                grid-column: span 2;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 15px 0;
            }

            .nav-links {
                display: none;
            }

            .mobile-menu-btn {
                display: block;
            }

            .footer-content {
                grid-template-columns: 1fr;
            }

            .footer-about {
                grid-column: span 1;
            }
        }
    </style>
</head>

    <style>
        /* Animated Dots Background */
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            overflow: hidden;
        }

        .dots-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #3b82f6;
            border-radius: 50%;
            opacity: 0.3;
            animation: move-dots 20s infinite linear;
        }

        .dot:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .dot:nth-child(2) {
            top: 20%;
            left: 20%;
            animation-delay: 1s;
        }

        .dot:nth-child(3) {
            top: 30%;
            left: 30%;
            animation-delay: 2s;
        }

        .dot:nth-child(4) {
            top: 40%;
            left: 40%;
            animation-delay: 3s;
        }

        .dot:nth-child(5) {
            top: 50%;
            left: 50%;
            animation-delay: 4s;
        }

        .dot:nth-child(6) {
            top: 60%;
            left: 60%;
            animation-delay: 5s;
        }

        .dot:nth-child(7) {
            top: 70%;
            left: 70%;
            animation-delay: 6s;
        }

        .dot:nth-child(8) {
            top: 80%;
            left: 80%;
            animation-delay: 7s;
        }

        .dot:nth-child(9) {
            top: 90%;
            left: 90%;
            animation-delay: 8s;
        }

        .dot:nth-child(10) {
            top: 15%;
            left: 85%;
            animation-delay: 9s;
        }

        @keyframes move-dots {
            0% {
                transform: translate(0, 0);
                opacity: 0.3;
            }

            25% {
                transform: translate(50px, 30px);
                opacity: 0.4;
            }

            50% {
                transform: translate(0, 60px);
                opacity: 0.2;
            }

            75% {
                transform: translate(-50px, 30px);
                opacity: 0.4;
            }

            100% {
                transform: translate(0, 0);
                opacity: 0.3;
            }
        }

        /* Grid Pattern with Animation */
        .grid-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(to right, rgba(59, 130, 246, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(59, 130, 246, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-move 30s infinite linear;
        }

        @keyframes grid-move {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(25px, 25px);
            }
        }

        /* Floating Emoji Animation Styles */
        .floating-emoji {
            position: fixed;
            font-size: 2.5rem;
            user-select: none;
            pointer-events: none;
            z-index: 10;
            opacity: 0.7;
            animation: floatEmoji 14s infinite ease-in-out;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.1));
        }

        .floating-emoji-1 {
            top: 15%;
            left: 5%;
            animation-duration: 16s;
            animation-delay: 0s;
        }

        .floating-emoji-2 {
            bottom: 20%;
            right: 3%;
            animation-duration: 18s;
            animation-delay: 1s;
        }

        .floating-emoji-3 {
            top: 40%;
            right: 8%;
            animation-duration: 14s;
            animation-delay: 2s;
        }

        .floating-emoji-4 {
            bottom: 35%;
            left: 4%;
            animation-duration: 20s;
            animation-delay: 0.5s;
        }

        .floating-emoji-5 {
            top: 65%;
            left: 12%;
            animation-duration: 17s;
            animation-delay: 3s;
        }

        .floating-emoji-6 {
            top: 25%;
            right: 12%;
            animation-duration: 15s;
            animation-delay: 1.5s;
        }

        .floating-emoji-7 {
            bottom: 10%;
            right: 18%;
            animation-duration: 19s;
            animation-delay: 2.5s;
        }

        .floating-emoji-8 {
            top: 75%;
            left: 8%;
            animation-duration: 13s;
            animation-delay: 4s;
        }

        @keyframes floatEmoji {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.4;
            }

            25% {
                transform: translate(20px, -25px) rotate(5deg);
                opacity: 0.8;
            }

            50% {
                transform: translate(-15px, -40px) rotate(-5deg);
                opacity: 0.6;
            }

            75% {
                transform: translate(15px, -15px) rotate(3deg);
                opacity: 0.9;
            }

            100% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.4;
            }
        }

        .floating-emoji:hover {
            animation-play-state: paused;
            transform: scale(1.2);
            filter: drop-shadow(0 0 8px rgba(30, 64, 175, 0.5));
            transition: all 0.3s ease;
            opacity: 1;
        }

        @media (max-width: 768px) {
            .floating-emoji {
                font-size: 1.8rem;
                opacity: 0.5;
            }
        }
    </style>

    <script>
        // Custom Popup System - replaces all alerts
        class CustomPopup {
            constructor() {
                this.overlay = document.getElementById('customPopup');
                this.iconEl = document.getElementById('popupIcon');
                this.titleEl = document.getElementById('popupTitle');
                this.messageEl = document.getElementById('popupMessage');
                this.closeBtn = document.getElementById('popupCloseBtn');

                this.closeBtn.addEventListener('click', () => this.hide());
                this.overlay.addEventListener('click', (e) => {
                    if (e.target === this.overlay) this.hide();
                });
            }

            show({ type = 'info', title, message, onClose = null }) {
                // Set icon and styling based on type
                let iconHtml = '';
                let iconClass = '';

                switch (type) {
                    case 'success':
                        iconHtml = '<i class="fas fa-check-circle"></i>';
                        iconClass = 'success';
                        break;
                    case 'error':
                        iconHtml = '<i class="fas fa-exclamation-triangle"></i>';
                        iconClass = 'error';
                        break;
                    case 'warning':
                        iconHtml = '<i class="fas fa-exclamation-circle"></i>';
                        iconClass = 'warning';
                        break;
                    case 'info':
                    default:
                        iconHtml = '<i class="fas fa-info-circle"></i>';
                        iconClass = 'info';
                        break;
                }

                this.iconEl.innerHTML = iconHtml;
                this.iconEl.className = `popup-icon ${iconClass}`;
                this.titleEl.textContent = title || (type === 'success' ? 'Success!' : type === 'error' ? 'Error!' : type === 'warning' ? 'Warning!' : 'Information');
                this.messageEl.textContent = message;

                // Change button style based on type
                this.closeBtn.className = `popup-btn ${type === 'error' ? 'error-btn' : type === 'success' ? 'success-btn' : 'primary'}`;
                this.closeBtn.textContent = 'Got it';

                this.overlay.classList.add('active');

                // Store onClose callback
                if (onClose) {
                    const originalClick = this.closeBtn.onclick;
                    this.closeBtn.onclick = () => {
                        this.hide();
                        if (onClose) onClose();
                    };
                } else {
                    this.closeBtn.onclick = () => this.hide();
                }
            }

            hide() {
                this.overlay.classList.remove('active');
            }
        }

        // Initialize popup
        const popup = new CustomPopup();

        // Override alert function globally to use custom popup (optional, but keeps consistency)
        window.alert = function (message) {
            popup.show({ type: 'info', title: 'Notice', message: message });
        };

        // Helper function to show different types of popups
        function showPopup(type, title, message, onClose = null) {
            popup.show({ type, title, message, onClose });
        }

        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById('loginForm');
            if (!form) return;

            // Forgot password link handler
            const forgotLink = document.getElementById('forgotPasswordLink');
            if (forgotLink) {
                forgotLink.addEventListener('click', function (e) {
                    e.preventDefault();
                    sendPasswordToCurrentInput();
                });
            }

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                const usernameInput = document.getElementById('username');
                const passwordInput = document.getElementById('password');
                const usernameError = document.getElementById('usernameError');
                const passwordError = document.getElementById('passwordError');
                const btn = document.querySelector('.btn');

                let isValid = true;

                // Reset errors
                usernameInput.classList.remove('invalid');
                passwordInput.classList.remove('invalid');
                usernameError.style.display = 'none';
                passwordError.style.display = 'none';

                // Validate username/email
                if (!usernameInput.value.trim()) {
                    usernameInput.classList.add('invalid');
                    usernameError.textContent = "Email or username is required.";
                    usernameError.style.display = 'block';
                    isValid = false;
                }

                // Validate password
                if (passwordInput.value.trim().length < 8) {
                    passwordInput.classList.add('invalid');
                    passwordError.textContent = "Password must be at least 8 characters.";
                    passwordError.style.display = 'block';
                    isValid = false;
                }

                if (!isValid) return;

                btn.textContent = "Logging in...";
                btn.disabled = true;

                try {
                    const response = await fetch('/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: usernameInput.value.trim(),
                            password: passwordInput.value
                        })
                    });

                    const data = await response.json();

                    if (response.ok && data.redirect) {
                        // Show success popup before redirect
                        showPopup('success', 'Login Successful!', 'Redirecting you to your dashboard...', () => {
                            window.location.href = data.redirect;
                        });
                        // Auto redirect after 1.5 seconds if they don't click button
                        setTimeout(() => {
                            window.location.href = data.redirect;
                        }, 1500);
                    } else {
                        showPopup('error', 'Login Failed', data.error || "Invalid credentials. Please try again.");
                        btn.textContent = "Login";
                        btn.disabled = false;
                    }
                } catch (err) {
                    console.error(err);
                    showPopup('error', 'Connection Error', "Unable to connect to server. Please check your internet connection and try again.");
                    btn.textContent = "Login";
                    btn.disabled = false;
                }
            });

            // Forgot Password - Send reset link to entered email with custom popup
            window.sendPasswordToCurrentInput = function () {
                const usernameInput = document.getElementById('username');
                const email = usernameInput.value.trim();
                const usernameError = document.getElementById('usernameError');

                usernameInput.classList.remove('invalid');
                usernameError.style.display = 'none';

                if (!email) {
                    usernameInput.classList.add('invalid');
                    usernameError.textContent = "Please enter your email first.";
                    usernameError.style.display = 'block';
                    showPopup('warning', 'Email Required', 'Please enter your email address to reset your password.');
                    return;
                }

                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    usernameInput.classList.add('invalid');
                    usernameError.textContent = "Please enter a valid email address.";
                    usernameError.style.display = 'block';
                    showPopup('warning', 'Invalid Email', 'Please enter a valid email address (e.g., name@example.com).');
                    return;
                }

                // Show loading state
                const originalValue = usernameInput.value;
                usernameInput.value = "Sending...";
                usernameInput.disabled = true;

                fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                })
                    .then(res => res.json())
                    .then(data => {
                        showPopup('success', 'Reset Link Sent', data.message || "If an account exists with that email, a password reset link has been sent.");
                    })
                    .catch(() => {
                        showPopup('error', 'Request Failed', "Unable to send reset link. Please try again later.");
                    })
                    .finally(() => {
                        usernameInput.value = originalValue;
                        usernameInput.disabled = false;
                    });
            };
        });

        // Make sendPasswordToCurrentInput globally available
        window.sendPasswordToCurrentInput = window.sendPasswordToCurrentInput || function () {
            const usernameInput = document.getElementById('username');
            const email = usernameInput?.value.trim();
            if (!email) {
                showPopup('warning', 'Email Required', 'Please enter your email address first.');
                const usernameError = document.getElementById('usernameError');
                if (usernameError) {
                    usernameInput.classList.add('invalid');
                    usernameError.textContent = "Please enter your email first.";
                    usernameError.style.display = 'block';
                }
                return;
            }
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                showPopup('warning', 'Invalid Email', 'Please enter a valid email address.');
                return;
            }
            showPopup('info', 'Reset Password', `A password reset link would be sent to ${email}. (Demo mode)`);
        };
    </script>

</body>

</html>
